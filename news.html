.ticker-wrapper {
            display: flex; align-items: center; height: 31px; flex-shrink: 0;

            position: sticky; 
            top: 100px; /* 네비게이션 바 높이(100px) 바로 밑에 위치 */
            z-index: 9998; /* 네비게이션 바(9999) 바로 아래 계층으로 설정 */
        }
        .ticker-label {
            position: relative; flex-shrink: 0; background: #2C9999; color: #ffffff;
            font-family: 'Orbitron', sans-serif; font-weight: 500; font-size: 0.85rem; letter-spacing: 1px;
            padding: 0 15px; height: 100%; display: flex; align-items: center; z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.9);
        }
        .ticker-label::after {
            content: ''; position: absolute; right: -10px; top: 0;
            border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 10px solid #2C9999;
        }
        .ticker-container { flex-grow: 1; overflow: hidden; display: flex; margin-left: 15px; }
        .ticker-content { display: flex; width: max-content; animation: tickerScroll 2000s linear infinite; }
        .ticker-content:hover { animation-play-state: paused; }
        .ticker-track { display: flex; gap: 40px; padding-right: 40px; }
        
        .ticker-item {
            display: inline-flex; align-items: center; gap: 12px; font-family: 'Chakra Petch', sans-serif;

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const tickerContent = document.getElementById('ticker-content');
            if(tickerContent && typeof links !== 'undefined') {
                let shuffled = [...links].sort(() => 0.5 - Math.random());
                
                let htmlString = '';
                shuffled.forEach(link => {
                    const flag = link.country ? `<span class="fi fi-${link.country}"></span>` : '<i class="fas fa-globe" style="color:#888;"></i>';
                    const cleanTitle = link.title.replace(/<br\s*\/?>/gi, ' '); 
                    const cleanTooltip = cleanTitle.replace(/<[^>]*>?/gm, '');

                    let coName = cleanTitle;
                    let coDesc = '';
                    if (cleanTitle.includes('(')) {
                        const splitIdx = cleanTitle.indexOf('(');
                        coName = cleanTitle.substring(0, splitIdx).trim();
                        coDesc = cleanTitle.substring(splitIdx).trim();
                    }

                    htmlString += `
                        <a href="${link.url}" target="_blank" class="ticker-item" title="${cleanTooltip} 사이트 방문">
                            ${flag} 
                            <span class="co-name">${coName}</span> 
                            <span class="co-desc">${coDesc}</span>
                        </a>`;
                });
                
                tickerContent.innerHTML = `
                    <div class="ticker-track">${htmlString}</div>
                    <div class="ticker-track">${htmlString}</div>
                `;
            }
        });
    </script>

    </section>

     <script>
        async function fetchGridNews() {
            const googleContainer = document.getElementById('google-news-container');
            const rssContainer = document.getElementById('rss-news-container');

            // 🚨 1. 문제의 rss2json 서버를 버리고, 제한 없는 AllOrigins 우회 터널과 자체 번역기(XML Parser)를 사용합니다.
            async function fetchRSS(url) {
                const parser = new DOMParser();
                // 1) Try AllOrigins proxy to avoid CORS issues
                try {
                    const proxy = 'https://api.allorigins.win/get?disableCache=true&url=';
                    const response = await fetch(proxy + encodeURIComponent(url));
                    if (response.ok) {
                        const data = await response.json();
                        const xml = parser.parseFromString(data.contents, "text/xml");
                        // if items found, return immediately
                        if (xml && xml.querySelectorAll && (xml.querySelectorAll('item').length > 0 || xml.querySelectorAll('entry').length > 0)) return xml;
                    }
                } catch (e) {
                    // continue to next strategy
                }

                // 2) Fall back to rss2json API (may be rate-limited but reliable for many feeds)
                try {
                    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=10`;
                    const r = await fetch(apiUrl);
                    if (r.ok) {
                        const j = await r.json();
                        if (j && j.items && j.items.length > 0) {
                            // Convert JSON items into a fake XMLDocument structure for compatibility
                            const doc = parser.parseFromString('<rss></rss>', 'text/xml');
                            const channel = doc.createElement('channel');
                            doc.documentElement.appendChild(channel);
                            j.items.forEach(it => {
                                const item = doc.createElement('item');
                                const title = doc.createElement('title');
                                title.textContent = it.title || '';
                                const link = doc.createElement('link');
                                link.textContent = it.link || '';
                                const pubDate = doc.createElement('pubDate');
                                pubDate.textContent = it.pubDate || '';
                                const description = doc.createElement('description');
                                description.textContent = it.description || '';
                                item.appendChild(title);
                                item.appendChild(link);
                                item.appendChild(pubDate);
                                item.appendChild(description);
                                channel.appendChild(item);
                            });
                            return doc;
                        }
                    }
                } catch (e) {
                    // ignore and continue
                }

                // 3) As a last resort, try fetching the feed URL directly (may fail due to CORS)
                try {
                    const r2 = await fetch(url);
                    if (r2.ok) {
                        const txt = await r2.text();
                        const xml = parser.parseFromString(txt, 'text/xml');
                        if (xml && xml.querySelectorAll && xml.querySelectorAll('item').length > 0) return xml;
                    }
                } catch (e) {
                    // give up and return empty doc
                }

                // return an empty document to be handled by caller
                return parser.parseFromString('<rss></rss>', 'text/xml');
            }

            // ==========================================
            // 2. Editor's Pick (Google News)
            // ==========================================
           // ==========================================
            // 2. Editor's Pick (Google News) - 단일 요청 (가장 안정적인 rss2json으로 복구)
            // ==========================================
            async function fetchGooglePicks() {
                const googleQuery = "robotics OR humanoid OR AI -fortune -wsj -bloomberg -nature -nytimes ";
                const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(googleQuery)}&hl=en-US&gl=US&ceid=US:en`;
                
                // 🚨 구글은 AllOrigins 대신 찰떡궁합인 rss2json으로 다시 복구! (1번 요청이라 차단 위험 없음)
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=10`;
                
                let finalPicks = [];
                const cacheKey = "newsCache_google_v10"; // 확실한 초기화

                try {
                    const response = await fetch(apiUrl);
                    const data = await response.json();

                    if (data.status === 'ok' && data.items) {
                        function isTooSimilar(t1, t2) {
                            const stopWords = ['how', 'the', 'and', 'for', 'with', 'from', 'this', 'that', 'robot', 'humanoid', 'artificial', 'intelligence', 'robotics'];
                            const w1 = t1.toLowerCase().split(/\W+/).filter(w => w.length > 2 && !stopWords.includes(w));
                            const w2 = t2.toLowerCase().split(/\W+/).filter(w => w.length > 2 && !stopWords.includes(w));
                            let match = 0;
                            w1.forEach(w => { if(w2.includes(w)) match++; });
                            return match >= 3;
                        }

                        for (const item of data.items) {
                            if (finalPicks.length >= 3) break;
                            const cleanTitle = item.title.replace(/<[^>]*>?/gm, '');

                            let isDuplicate = finalPicks.some(p => isTooSimilar(p.title, cleanTitle));
                            if (!isDuplicate) {
                                finalPicks.push({
                                    title: cleanTitle,
                                    link: item.link,
                                    pubDate: new Date(item.pubDate)
                                });
                            }
                        }

                        if (finalPicks.length > 0) {
                            localStorage.setItem(cacheKey, JSON.stringify(finalPicks));
                        }
                    }
                } catch (e) {
                    console.log("Google fetch error, restoring from cache");
                }

                // 🚨 통신 실패 시 과거 백업(final, v8 등)까지 영혼 끌어모아 복구
                if (finalPicks.length === 0) {
                    const cached = localStorage.getItem(cacheKey) || localStorage.getItem("newsCache_google_final") || localStorage.getItem("newsCache_google_v8");
                    if (cached) {
                        finalPicks = JSON.parse(cached);
                        finalPicks.forEach(item => item.pubDate = new Date(item.pubDate));
                    }
                }

                const googleContainer = document.getElementById('google-news-container');
                if (finalPicks.length > 0 && googleContainer) {
                    let html = `<div class="news-card" style="grid-column: 1 / -1; border-color: #4285F4 !important; padding: 20px 25px;"><ul class="article-list" style="gap: 12px;">`;
                    finalPicks.forEach((news, index) => {
                        const dateStr = news.pubDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                        const borderStyle = index < finalPicks.length - 1 ? 'border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px;' : 'padding-bottom: 0;';
                        
                        // 🚨 1. 구글이 숨겨둔 특수 공백(&nbsp;)과 깨진 기호들을 실제 기호로 강제 세탁합니다.
                        let cleanText = news.title.replace(/&nbsp;/gi, ' ').replace(/&#8211;/g, '–');
                        let displayTitle = cleanText;
                        let sourceText = "";
                        
                        // 🚨 2. 정규식 강화: 뒤에서부터 가장 마지막에 있는 하이픈(-)이나 파이프(|)를 무조건 찾아냅니다.
                        const match = cleanText.match(/(.*?)\s*([-–—|])\s*([^-–—|]+)$/);
                        if (match) {
                            displayTitle = match[1].trim(); 
                            sourceText = " " + match[2] + " " + match[3].trim(); 
                        }

                        // 🚨 3. 분리해낸 언론사명(sourceText)에 var(--primary) 대신 확실한 헥스코드(#2C9999)를 주입합니다.
                        html += `
                            <li class="article-item" style="${borderStyle}">
                                <a href="${news.link}" target="_blank" class="article-title" style="display:inline; margin-bottom:0; line-height:1.5;">
                                    ${displayTitle}
                                    <span style="color: #2C9999; font-size: 0.9rem;">${sourceText}</span>
                                </a>
                                <span class="article-date" style="display:inline-block; margin-left: 8px; color: #888; font-size: 0.85rem;"><i class="far fa-clock"></i> ${dateStr}</span>
                            </li>
                        `;
                    });
                    html += `</ul></div>`;
                    googleContainer.innerHTML = html;
                } else if (googleContainer) {
                    googleContainer.innerHTML = '<p style="color: #FF5555; grid-column: 1 / -1; text-align: center;">현재 뉴스를 불러올 수 없습니다. 잠시 후 새로고침 해주세요.</p>';
                }

                return finalPicks.map(article => article.title.toLowerCase());
            }

           // ==========================================
            // 2. 전문 매체 전용 로직 (위쪽 구글 픽은 절대 건드리지 않음)
            // ==========================================
            // ==========================================
            // 3. 전문 매체 전용 로직 (점진적 개별 렌더링으로 체감 속도 극대화)
            // ==========================================
            // ==========================================
            // 3. 전문 매체 전용 로직 (안전한 순차 렌더링 + 예비 캐시 총동원)
            // ==========================================
           // ==========================================
            // 3. 전문 매체 전용 로직 (6개 엄선 & 딜레이 없는 동시 다발 렌더링!)
            // ==========================================
            // ==========================================
            // 3. 전문 매체 전용 로직 (6개 엄선 & 시차 출발 동시 렌더링)
            // ==========================================
            async function fetchSpecializedNews(excludeTitles = []) {
                const specializedSources = [
                    { name: "TechCrunch", url: "https://techcrunch.com/category/robotics/feed/", domain: "techcrunch.com" },
                    { name: "IEEE Spectrum", url: "https://spectrum.ieee.org/feeds/topic/robotics.rss", domain: "spectrum.ieee.org" },
                    { name: "The Robot Report", url: "https://www.therobotreport.com/feed/", domain: "therobotreport.com" },
                    { name: "TechXplore", url: "https://techxplore.com/rss-feed/robotics-news/", domain: "techxplore.com" },
                    { name: "ScienceDaily", url: "https://www.sciencedaily.com/rss/matter_energy/robotics.xml", domain: "sciencedaily.com" },
                    { name: "Robohub", url: "https://robohub.org/feed/", domain: "robohub.org" }
                ];

                const fallbackData = {
                    "TechCrunch": [
                        { title: "Robotics startups to watch", link: "https://techcrunch.com/" },
                        { title: "Robots in industry: trends", link: "https://techcrunch.com/" },
                        { title: "AI and robotics: integration", link: "https://techcrunch.com/" }
                    ],
                    "IEEE Spectrum": [
                        { title: "Robotics advances roundup", link: "https://spectrum.ieee.org/" },
                        { title: "New robot control methods", link: "https://spectrum.ieee.org/" },
                        { title: "Sensor fusion in robotics", link: "https://spectrum.ieee.org/" }
                    ],
                    "The Robot Report": [
                        { title: "Industry update: robots", link: "https://www.therobotreport.com/" },
                        { title: "Factory automation news", link: "https://www.therobotreport.com/" },
                        { title: "Service robots market", link: "https://www.therobotreport.com/" }
                    ],
                    "TechXplore": [
                        { title: "New robotics research", link: "https://techxplore.com/" },
                        { title: "Soft robotics breakthroughs", link: "https://techxplore.com/" },
                        { title: "Robotic locomotion advances", link: "https://techxplore.com/" }
                    ],
                    "ScienceDaily": [
                        { title: "Latest robotics studies", link: "https://www.sciencedaily.com/" },
                        { title: "Materials for robots", link: "https://www.sciencedaily.com/" },
                        { title: "Bio-inspired robotics", link: "https://www.sciencedaily.com/" }
                    ],
                    "Robohub": [
                        { title: "Robohub: robotics news roundup", link: "https://robohub.org/" },
                        { title: "Robohub: research & industry updates", link: "https://robohub.org/" },
                        { title: "Robohub: interviews and analysis", link: "https://robohub.org/" }
                    ]
                };

                const rssContainer = document.getElementById('rss-news-container');
                // 1. 슬롯 초기화: 6개 카드 스켈레톤을 미리 보여줍니다.
                rssContainer.innerHTML = "";
                specializedSources.forEach((source, index) => {
                    rssContainer.innerHTML += `
                        <div id="news-slot-${index}" class="news-card" style="justify-content: center; align-items: center; min-height: 200px; border: 1px dashed rgba(134,209,209,0.3); background: transparent; box-shadow: none;">
                            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); opacity: 0.5;"></i>
                        </div>`;
                });

                // fetch with graceful timeout & fallback. reduce stagger for faster UX.
                const fetchPromises = specializedSources.map(async (source, index) => {
                    await new Promise(resolve => setTimeout(resolve, index * 100)); // faster stagger

                    const cacheKey = `newsCache_${source.name}_final`;
                    let validArticles = [];

                    try {
                        // race the RSS fetch against a timeout so slow networks fail fast
                        const xmlDoc = await Promise.race([
                            fetchRSS(source.url),
                            new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 6000))
                        ]);

                        const items = xmlDoc ? xmlDoc.querySelectorAll('item, entry') : [];
                        if (items && items.length > 0) {
                            for (const item of items) {
                                    if (validArticles.length >= 3) break;
                                    const titleNode = item.querySelector('title');
                                    const linkNode = item.querySelector('link');
                                    const guidNode = item.querySelector('guid');
                                    const dateNode = item.querySelector('pubDate');
                                    const descNode = item.querySelector('description') || item.querySelector('summary') || item.querySelector('content\:encoded');

                                    function safeText(node) { if(!node) return ''; return (node.textContent||'').replace(/<!\[CDATA\[/g, '').replace(/\]\]>/g, '').replace(/<[^>]*>?/gm, '').trim(); }

                                    let title = safeText(titleNode) || safeText(descNode).split('\n')[0] || '';
                                    // link extraction: handle Atom <link href="..." rel="alternate">, RSS <link>, <guid>, or anchor in description
                                    let link = '';
                                    try {
                                        // Prefer explicit href on any <link> elements (Atom often uses <link href="..."/>)
                                        const linkEls = item.querySelectorAll('link');
                                        if (linkEls && linkEls.length) {
                                            for (const le of linkEls) {
                                                // try href attribute first
                                                if (le.getAttribute) {
                                                    const href = le.getAttribute('href') || le.getAttribute('HREF');
                                                    const rel = (le.getAttribute('rel') || '').toLowerCase();
                                                    const type = (le.getAttribute('type') || '').toLowerCase();
                                                    if (href && (rel.includes('alternate') || type.includes('html') || linkEls.length === 1)) {
                                                        link = href.trim();
                                                        break;
                                                    }
                                                    if (href && !link) link = href.trim();
                                                }
                                                // fallback to textContent if present
                                                if (!link && le.textContent && le.textContent.trim()) {
                                                    link = le.textContent.trim();
                                                    break;
                                                }
                                            }
                                        }
                                    } catch (e) {
                                        // ignore
                                    }

                                    if (!link && guidNode) link = (guidNode.textContent || '').trim();
                                    if (!link && linkNode) {
                                        // older RSS sometimes has URL as text node inside <link>
                                        link = (linkNode.textContent || '').trim() || (linkNode.getAttribute && linkNode.getAttribute('href')) || '';
                                    }
                                    if (!link && descNode) {
                                        // try to extract href from anchor or plain URL in description HTML/text
                                        const descHtml = descNode.textContent || '';
                                        const m = descHtml.match(/https?:\/\/[^\s"']+/);
                                        if (m) link = m[0];
                                    }

                                    title = title.trim();
                                    link = (link || '').trim();

                                    if (!title) continue;

                                    let isDuplicate = excludeTitles.some(exTitle => exTitle === title.toLowerCase());
                                    if (isDuplicate) continue;

                                    validArticles.push({ title: title, link: link || source.url, pubDate: new Date(dateNode ? dateNode.textContent : Date.now()) });
                                }
                            if (validArticles.length > 0) localStorage.setItem(cacheKey, JSON.stringify(validArticles));
                        }
                    } catch (e) {
                        // on error, try cached data (multiple legacy keys)
                        const cachedData = localStorage.getItem(cacheKey) || localStorage.getItem(`newsCache_${source.name}_safe`) || localStorage.getItem(`newsCache_${source.name}_v8`) || localStorage.getItem(`newsCache_${source.name}`);
                        if (cachedData) {
                            validArticles = JSON.parse(cachedData);
                            validArticles.forEach(item => item.pubDate = new Date(item.pubDate));
                        }
                    }

                    // If fewer than 3 articles, fill from cached/fallback so each card shows up to 3 entries.
                    if (!validArticles || validArticles.length === 0) {
                        const fb = fallbackData[source.name] || [{ title: `No recent articles. Visit ${source.name}`, link: source.url }];
                        validArticles = fb.map(it => ({ title: it.title, link: it.link, pubDate: new Date() }));
                    } else if (validArticles.length < 3) {
                        const fb = fallbackData[source.name] || [{ title: `No recent articles. Visit ${source.name}`, link: source.url }];
                        let i = 0;
                        while (validArticles.length < 3) {
                            const pick = fb[i % fb.length];
                            validArticles.push({ title: pick.title, link: pick.link, pubDate: new Date() });
                            i++;
                        }
                    }

                    // render the card (always replace the slot)
                    const slot = document.getElementById(`news-slot-${index}`);
                    const iconUrl = `https://www.google.com/s2/favicons?domain=${source.domain}&sz=64`;
                    let cardHTML = `<div class="news-card"><div class="source-header"><img src="${iconUrl}" alt="logo" class="source-icon">${source.name}</div><ul class="article-list">`;
                    validArticles.forEach(news => {
                        const dateStr = news.pubDate ? news.pubDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';
                        cardHTML += `<li class="article-item"><a href="${news.link}" target="_blank" class="article-title">${news.title}</a><div class="article-date"><i class="far fa-clock"></i> ${dateStr}</div></li>`;
                    });
                    cardHTML += `</ul></div>`;
                    if (slot) slot.outerHTML = cardHTML;
                });

                await Promise.all(fetchPromises);
            } // fetchSpecializedNews 끝

            // 🚨 핵심 부품 복구: 만들어둔 위/아래 뉴스를 실제로 '실행'하는 명령어입니다!
            const pickedTitles = await fetchGooglePicks();
            await fetchSpecializedNews(pickedTitles);

        } // <-- 🚨 자바스크립트 에러를 막아주는 진짜 마지막 닫는 괄호 복구!

        // 페이지가 열리면 위 함수를 작동시켜라
        window.addEventListener('DOMContentLoaded', fetchGridNews);
    </script>
</body>
</html>
