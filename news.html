.ticker-wrapper {

            z-index: 9998; /* 네비게이션 바(9999) 바로 아래 계층으로 설정 */
        }
        .ticker-label {
            position: relative; flex-shrink: 0; background: #2C9999; color: #ffffff;
            font-family: 'Orbitron', sans-serif; font-weight: 500; font-size: 0.85rem; letter-spacing: 1px;
            padding: 0 15px; height: 100%; display: flex; align-items: center; z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.9);
        }
        .ticker-label::after {
            content: ''; position: absolute; right: -10px; top: 0;
            border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 10px solid #2C9999;
        }
        .ticker-container { flex-grow: 1; overflow: hidden; display: flex; margin-left: 15px; }
        .ticker-content { display: flex; width: max-content; animation: tickerScroll 2000s linear infinite; }

        .ticker-track { display: flex; gap: 40px; padding-right: 40px; }
        
        .ticker-item {
            display: inline-flex; align-items: center; gap: 12px; font-family: 'Chakra Petch', sans-serif;

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const tickerContent = document.getElementById('ticker-content');
            if(tickerContent && typeof links !== 'undefined') {
                let shuffled = [...links].sort(() => 0.5 - Math.random());
                
                let htmlString = '';
                shuffled.forEach(link => {
                    const flag = link.country ? `<span class="fi fi-${link.country}"></span>` : '<i class="fas fa-globe" style="color:#888;"></i>';
                    const cleanTitle = link.title.replace(/<br\s*\/?>/gi, ' '); 
                    const cleanTooltip = cleanTitle.replace(/<[^>]*>?/gm, '');

                    let coName = cleanTitle;
                    let coDesc = '';
                    if (cleanTitle.includes('(')) {
                        const splitIdx = cleanTitle.indexOf('(');
                        coName = cleanTitle.substring(0, splitIdx).trim();
                        coDesc = cleanTitle.substring(splitIdx).trim();
                    }

                    htmlString += `
                        <a href="${link.url}" target="_blank" class="ticker-item" title="${cleanTooltip} 사이트 방문">
                            ${flag} 
                            <span class="co-name">${coName}</span> 
                            <span class="co-desc">${coDesc}</span>
                        </a>`;
                });
                
                tickerContent.innerHTML = `
                    <div class="ticker-track">${htmlString}</div>
                    <div class="ticker-track">${htmlString}</div>
                `;
            }
        });
    </script>

            // 1. Google's Pick 전용 로직 (캐시 적용)
            // ==========================================
            async function fetchGooglePicks() {
                const googleSources = [
                    { id: "humanoids", url: "https://news.google.com/rss/search?q=humanoid+robot+OR+boston+dynamics+OR+figure+ai&hl=en-US&gl=US&ceid=US:en" }, 
                    { id: "ai", url: "https://news.google.com/rss/search?q=AI+robot+OR+artificial+intelligence+automation&hl=en-US&gl=US&ceid=US:en" },
                    { id: "robotics", url: "https://news.google.com/rss/search?q=robotics+OR+automation+OR+mechatronics&hl=en-US&gl=US&ceid=US:en" }
                ];

                let fetchedData = { humanoids: [], ai: [], robotics: [] };

                const promises = googleSources.map(async (source) => {
                    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&count=10`;
                    try {
                        const response = await fetch(apiUrl);
                        const data = await response.json();
                        
                        if (data.status === 'ok' && data.items) {
                            for (const item of data.items) {
                                const cleanTitle = item.title.replace(/<[^>]*>?/gm, ''); 
                                const contentText = (item.description || item.content || "").replace(/<[^>]*>?/gm, '').toLowerCase();
                                const titleLower = cleanTitle.toLowerCase();
                                const fullContext = titleLower + " " + contentText; 

                                let isRelevant = true;
                                const badWords = ['archaeology', 'dinosaur', 'movie review', 'fossil'];
                                if (badWords.some(word => titleLower.includes(word))) isRelevant = false;

                                const goodWords = [
                                    'robot', 'ai', 'humanoid', 'automation', 'autonomous', 'funding', 'investment', 
                                    'boston dynamics', 'figure ai', 'tesla bot', 'optimus', 'agility robotics', 
                                    'sanctuary', 'apptronik', 'unitree', 'machine learning', 'exoskeleton'
                                ];
                                if (!goodWords.some(word => fullContext.includes(word))) isRelevant = false;

                                if (isRelevant) {
                                    fetchedData[source.id].push({
                                        title: cleanTitle,
                                        link: item.link,
                                        pubDate: new Date(item.pubDate)
                                    });
                                }
                            }
                        }
                    } catch (e) { console.log("Google fetch error:", source.id); }
                });

                await Promise.all(promises);

                function isTooSimilar(t1, t2) {
                    const stopWords = ['how', 'the', 'and', 'for', 'with', 'from', 'this', 'that', 'robot', 'humanoid', 'artificial', 'intelligence', 'robotics', 'automation'];
                    const w1 = t1.toLowerCase().split(/\W+/).filter(w => w.length > 2 && !stopWords.includes(w));
                    const w2 = t2.toLowerCase().split(/\W+/).filter(w => w.length > 2 && !stopWords.includes(w));
                    let match = 0;
                    w1.forEach(w => { if(w2.includes(w)) match++; });
                    return match >= 3; 
                }

                let finalPicks = [];
                let pools = [fetchedData.humanoids, fetchedData.ai, fetchedData.robotics];
                
                function tryAddArticle(pool) {
                    while(pool.length > 0) {
                        let candidate = pool.shift();
                        let isDuplicate = finalPicks.some(p => isTooSimilar(p.title, candidate.title));
                        if (!isDuplicate) {
                            finalPicks.push(candidate);
                            return true;
                        }
                    }
                    return false;
                }

                for (let pool of pools) { tryAddArticle(pool); }
                while (finalPicks.length < 3) {
                    let added = false;
                    for (let pool of pools) {
                        if (finalPicks.length < 3) {
                            if (tryAddArticle(pool)) added = true;
                        }
                    }
                    if (!added) break; 
                }

                // 🚨 구글 뉴스 백업 적용
                const googleCacheKey = "newsCache_googlePicks";
                if (finalPicks.length >= 3) {
                    localStorage.setItem(googleCacheKey, JSON.stringify(finalPicks));
                } else {
                    const cached = localStorage.getItem(googleCacheKey);
                    if (cached) {
                        finalPicks = JSON.parse(cached);
                        finalPicks.forEach(item => item.pubDate = new Date(item.pubDate));
                    }
                }

                if (finalPicks.length > 0 && googleContainer) {
                    let html = `
                        <div class="news-card" style="grid-column: 1 / -1; border-color: #4285F4 !important; padding: 20px 25px;">
                            <ul class="article-list" style="gap: 12px;">
                    `;
                    finalPicks.forEach((news, index) => {
                        const dateStr = news.pubDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                        const borderStyle = index < finalPicks.length - 1 ? 'border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px;' : 'padding-bottom: 0;';
                        
                        html += `
                            <li class="article-item" style="${borderStyle}">
                                <a href="${news.link}" target="_blank" class="article-title" style="display:inline; margin-bottom:0; line-height:1.5;">
                                    ${news.title}
                                </a>
                                <span class="article-date" style="display:inline-block; margin-left: 8px; color: #888; font-size: 0.85rem;">
                                    <i class="far fa-clock"></i> ${dateStr}
                                </span>
                            </li>
                        `;
                    });
                    html += `
                            </ul>
                        </div>
                    `;
                    googleContainer.innerHTML = html;
                } else if (googleContainer) {
                    googleContainer.innerHTML = '<p style="color: #FF5555; grid-column: 1 / -1; text-align: center;">No Google top picks available right now.</p>';
                }
            }

            // ==========================================
            // 2. 전문 매체 전용 로직 (순차적 통신 + 로컬 캐시)
            // ==========================================
            async function fetchSpecializedNews() {
                const specializedSources = [
                    { name: "TechCrunch", url: "https://techcrunch.com/category/robotics/feed/", domain: "techcrunch.com" },
                    { name: "IEEE Spectrum", url: "https://spectrum.ieee.org/feeds/topic/robotics.rss", domain: "spectrum.ieee.org" },
                    { name: "The Robot Report", url: "https://www.therobotreport.com/feed/", domain: "therobotreport.com" },
                    { name: "Robotics & Auto", url: "https://roboticsandautomationnews.com/feed/", domain: "roboticsandautomationnews.com" },
                    { name: "ScienceDaily", url: "https://www.sciencedaily.com/rss/matter_energy/robotics.xml", domain: "sciencedaily.com" },
                    { name: "Interesting Eng.", url: "https://interestingengineering.com/feed", domain: "interestingengineering.com" },
                    { name: "Wired", url: "https://www.wired.com/feed/tag/robotics/latest/rss", domain: "wired.com" }, 
                    { name: "Robotics Tomorrow", url: "https://roboticstomorrow.com/rss.xml", domain: "roboticstomorrow.com" }, 
                    { name: "PopSci", url: "https://www.popsci.com/category/technology/robotics/feed/", domain: "popsci.com" }, 
                    { name: "The Verge", url: "https://www.theverge.com/rss/robotics/index.xml", domain: "theverge.com" },
                    { name: "MIT News", url: "https://news.mit.edu/rss/topic/robotics", domain: "mit.edu" },
                    { name: "Robohub", url: "https://robohub.org/feed/", domain: "robohub.org" }
                ];

                let sourceDataMap = {};
                
                // 🚨 핵심 수정: map과 Promise.all(동시 발사)을 지우고, for...of 루프(순서대로 1개씩)를 사용합니다!
                for (const source of specializedSources) {
                    // 이미 성공적으로 9개의 언론사 데이터를 확보했다면, 남은 언론사는 굳이 통신하지 않고 멈춤 (속도 최적화)
                    if (Object.keys(sourceDataMap).length >= 9) break;

                    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&count=10`; 
                    const cacheKey = `newsCache_${source.name}`; 

                    try {
                        const response = await fetch(apiUrl);
                        const data = await response.json();
                        
                        if (data.status === 'ok' && data.items && data.items.length > 0) {
                            let validArticles = [];
                            for (const item of data.items) {
                                if (validArticles.length >= 3) break; 
                                validArticles.push({
                                    title: item.title.replace(/<[^>]*>?/gm, ''),
                                    link: item.link,
                                    pubDate: new Date(item.pubDate)
                                });
                            }
                            if (validArticles.length > 0) {
                                sourceDataMap[source.name] = validArticles;
                                // 통신 성공! 브라우저 메모리에 기사 덮어쓰기 (백업)
                                localStorage.setItem(cacheKey, JSON.stringify(validArticles));
                            }
                        } else {
                            throw new Error("Empty data or rate limit hit"); 
                        }
                    } catch (e) { 
                        // 통신 실패 시 캐시에서 꺼내오기
                        console.log(`Failed to load ${source.name}, restoring from cache...`);
                        const cachedData = localStorage.getItem(cacheKey);
                        if (cachedData) {
                            const parsedData = JSON.parse(cachedData);
                            parsedData.forEach(item => item.pubDate = new Date(item.pubDate));
                            sourceDataMap[source.name] = parsedData;
                        }
                    }
                }

                let newsHTML = "";
                let renderedCards = 0; 
                
                specializedSources.forEach(source => {
                    if (renderedCards >= 9) return; 
                    
                    const articles = sourceDataMap[source.name];
                    
                    if (articles && articles.length > 0) {
                        const iconUrl = `https://www.google.com/s2/favicons?domain=${source.domain}&sz=64`;
                        newsHTML += `
                            <div class="news-card">
                                <div class="source-header">
                                    <img src="${iconUrl}" alt="logo" class="source-icon">
                                    ${source.name}
                                </div>
                                <ul class="article-list">
                        `;
                        articles.forEach(news => {
                            const dateStr = news.pubDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                            newsHTML += `
                                <li class="article-item">
                                    <a href="${news.link}" target="_blank" class="article-title">${news.title}</a>
                                    <div class="article-date"><i class="far fa-clock"></i> ${dateStr}</div>
                                </li>
                            `;
                        });
                        newsHTML += `</ul></div>`;
                        renderedCards++; 
                    }
                });

                if (newsHTML !== "" && rssContainer) {
                    rssContainer.innerHTML = newsHTML;
                } else if (rssContainer) {
                    rssContainer.innerHTML = '<p style="color: #FF5555; grid-column: 1 / -1; text-align: center;">No news available at the moment.</p>';
                }
            }

            // 구글 픽과 전문 매체 뉴스를 동시에 비동기로 불러오기
            fetchGooglePicks();
            fetchSpecializedNews();
        }

        window.addEventListener('DOMContentLoaded', fetchGridNews);
    </script>
    </script>
