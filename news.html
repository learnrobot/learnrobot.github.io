    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const tickerContent = document.getElementById('ticker-content');
            if(tickerContent && typeof links !== 'undefined') {
                let shuffled = [...links].sort(() => 0.5 - Math.random());
                
                let htmlString = '';
                shuffled.forEach(link => {
                    const flag = link.country ? `<span class="fi fi-${link.country}"></span>` : '<i class="fas fa-globe" style="color:#888;"></i>';
                    const cleanTitle = link.title.replace(/<br\s*\/?>/gi, ' '); 
                    const cleanTooltip = cleanTitle.replace(/<[^>]*>?/gm, '');

                    let coName = cleanTitle;
                    let coDesc = '';
                    if (cleanTitle.includes('(')) {
                        const splitIdx = cleanTitle.indexOf('(');
                        coName = cleanTitle.substring(0, splitIdx).trim();
                        coDesc = cleanTitle.substring(splitIdx).trim();
                    }

                    htmlString += `
                        <a href="${link.url}" target="_blank" class="ticker-item" title="${cleanTooltip} 사이트 방문">
                            ${flag} 
                            <span class="co-name">${coName}</span> 
                            <span class="co-desc">${coDesc}</span>
                        </a>`;
                });
                
                tickerContent.innerHTML = `
                    <div class="ticker-track">${htmlString}</div>
                    <div class="ticker-track">${htmlString}</div>
                `;
            }
        });
    </script>

   <script>
        async function fetchGridNews() {
            const container = document.getElementById('rss-news-container');
            if (!container) return;

            // 🚨 기존 매체 + '절대 실패하지 않는' 예비 매체(Google News 특화 등) 대거 추가 (총 15개)

			{ name: "Google: Humanoids", url: "https://news.google.com/rss/search?q=humanoid+robot&hl=en-US&gl=US&ceid=US:en" }, // 신규 추가
                { name: "Google: AI Bots", url: "https://news.google.com/rss/search?q=AI+robot&hl=en-US&gl=US&ceid=US:en" }, // 신규 추가

                { name: "IEEE Spectrum", url: "https://spectrum.ieee.org/feeds/topic/robotics.rss" },
                { name: "The Robot Report", url: "https://www.therobotreport.com/feed/" },
                { name: "The Verge", url: "https://www.theverge.com/rss/robotics/index.xml" },
                { name: "MIT News", url: "https://news.mit.edu/rss/topic/robotics" },
                { name: "Robotics & Auto", url: "https://roboticsandautomationnews.com/feed/" },
                { name: "ScienceDaily", url: "https://www.sciencedaily.com/rss/matter_energy/robotics.xml" },
                { name: "Interesting Eng.", url: "https://interestingengineering.com/feed" },
                
                { name: "Wired", url: "https://www.wired.com/feed/tag/robotics/latest/rss" }, // 신규 추가 (매우 안정적)
                
                { name: "Robotics Tomorrow", url: "https://roboticstomorrow.com/rss.xml" }, 
                { name: "PopSci", url: "https://www.popsci.com/category/technology/robotics/feed/" }, 
                { name: "Robohub", url: "https://robohub.org/feed/" }
            ];

            // 매체별로 기사를 담을 객체 생성
            let sourceDataMap = {};
            
            // 두 달(60일) 전 날짜 계산
            const twoMonthsAgo = new Date();
            twoMonthsAgo.setDate(twoMonthsAgo.getDate() - 60);

            try {
                // 여러 매체에 동시에 API 요청
                const fetchPromises = allRssSources.map(async (source) => {
                    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&count=10`;
                    try {
                        const response = await fetch(apiUrl);
                        const data = await response.json();
                        
                        if (data.status === 'ok' && data.items && data.items.length > 0) {
                            let validArticles = [];
                            
                            // 조건에 맞는 기사만 최대 3개 추출
                            for (const item of data.items) {
                                if (validArticles.length >= 3) break; 
                                
                                const pubDate = new Date(item.pubDate);
                                if (pubDate >= twoMonthsAgo) {
                                    validArticles.push({
                                        title: item.title.replace(/<[^>]*>?/gm, ''), // 태그 제거
                                        link: item.link,
                                        pubDate: pubDate
                                    });
                                }
                            }
                            // 유효한 기사가 하나라도 있으면 맵에 저장
                            if (validArticles.length > 0) {
                                sourceDataMap[source.name] = validArticles;
                            }
                        }
                    } catch (e) { 
                        console.log("Failed to load:", source.name); 
                    }
                });

                // 모든 API 요청이 끝날 때까지 대기
                await Promise.all(fetchPromises);

                let newsHTML = "";
                let renderedCards = 0; // 화면에 그린 카드 개수 추적
                
                // 설정한 매체 순서대로 카드를 생성 (딱 9개까지만 그림)
                allRssSources.forEach(source => {
                    if (renderedCards >= 9) return; // 🚨 9개가 채워지면 더 이상 그리지 않고 중단

                    const articles = sourceDataMap[source.name];
                    
                    if (articles && articles.length > 0) {
                        // 1. 카드 시작 & 매체명 헤더
                        newsHTML += `
                            <div class="news-card">
                                <div class="source-header">${source.name}</div>
                                <ul class="article-list">
                        `;
                        
                        // 2. 카드 내부 기사 리스트 3개
                        articles.forEach(news => {
                            const dateStr = news.pubDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                            newsHTML += `
                                <li class="article-item">
                                    <a href="${news.link}" target="_blank" class="article-title">${news.title}</a>
                                    <div class="article-date"><i class="far fa-clock"></i> ${dateStr}</div>
                                </li>
                            `;
                        });

                        // 3. 카드 닫기
                        newsHTML += `
                                </ul>
                            </div>
                        `;
                        
                        renderedCards++; // 그려진 카드 수 1 증가
                    }
                });

                // 화면에 렌더링
                if (newsHTML !== "") {
                    container.innerHTML = newsHTML;
                } else {
                    container.innerHTML = '<p style="color: #FF5555; grid-column: 1 / -1; text-align: center;">No news available within the last 2 months.</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="color: #FF5555; grid-column: 1 / -1; text-align: center;">Failed to load news feeds.</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', fetchGridNews);
    </script>
</body>
</html>
