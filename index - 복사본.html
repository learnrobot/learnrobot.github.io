<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>LearnRobot | The Future is Here</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 기본 여백 제거 및 스크롤 숨김 (완벽한 풀스크린) */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #101216;
            font-family: 'Roboto', sans-serif;
        }


.image-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: url('image/industrial_humanoid_robot.jpg') no-repeat right center/cover; /* 중심축을 우측으로 이동 */
}

        /* 2. 이미지 위를 덮는 다크/블루 그라데이션 오버레이 (글씨 가독성 완전 확보) */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(
                135deg, 
                rgba(16, 18, 22, 0.95) 0%, 
                rgba(16, 18, 22, 0.6) 50%, 
                rgba(134, 209, 209, 0.25) 100%
            );
            z-index: 1;
        }

        /* 3. 중앙 콘텐츠 정렬 */
        .content-container {
            position: relative;
            z-index: 2;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        /* 타이포그래피 */
        .system-status {
            font-family: 'Chakra Petch', sans-serif;
            color: #86D1D1;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 900;
            color: #ffffff;
            margin: 0 0 15px 0;
            line-height: 1.1;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(134, 209, 209, 0.5);
        }

        .sub-title {
            font-family: 'Roboto', sans-serif;
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: #cccccc;
            max-width: 700px;
            margin: 0 auto 50px auto;
            line-height: 1.6;
            font-weight: 300;
        }

        /* 4. 시그니처 네온 포털 버튼 */
        .enter-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: rgba(134, 209, 209, 0.1);
            color: #86D1D1;
            border: 2px solid #86D1D1;
            padding: 18px 45px;
            border-radius: 50px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(134, 209, 209, 0.2), inset 0 0 10px rgba(134, 209, 209, 0.1);
            backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: #86D1D1;
            color: #101216;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(134, 209, 209, 0.5);
        }

        .enter-btn i {
            font-size: 1.5rem;
            transition: transform 0.3s;
        }

        .enter-btn:hover i {
            transform: translateX(5px);
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 10px rgba(134,209,209,0.8); }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="image-bg"></div>

    <div class="overlay"></div>

    <div class="content-container">
        <div class="system-status">
            <i class="fas fa-circle-notch fa-spin" style="margin-right: 8px;"></i> Industrial Physical AI Active
        </div>
        
        <h1 class="main-title">MEET YOUR NEW<br><span style="color: #86D1D1;">CO-WORKER</span></h1>
        
        <p class="sub-title">
            The era of embodied AI has arrived. Discover how industrial automation and smart robotics are reshaping the modern STEM landscape. No hard hats required.
        </p>

        <a href="lab.html" class="enter-btn">
            Initialize Lab <i class="fas fa-arrow-right"></i>
        </a>
    </div>

</body>
</html>
