        /* 뚝뚝 끊김 없는 부드러운 '딥 브레스(Deep Breath)' 효과 */
        /* 노란색(#FFFB03) 네온 호흡 효과 */
        @keyframes neon-smooth-flow {
            0% {
                /* 빛이 약할 때: 노란색(255, 251, 3)의 투명도 조절 */
                box-shadow: 0 0 4px rgba(255, 251, 3, 0.2), inset 0 0 2px rgba(255, 251, 3, 0.1);
                border-color: rgba(255, 251, 3, 0.3);
                background-color: rgba(40, 40, 40, 0.3);
            }
            50% {
                /* 빛이 강할 때 */
                box-shadow: 0 0 15px rgba(255, 251, 3, 0.9), inset 0 0 8px rgba(255, 251, 3, 0.5);
                border-color: rgba(255, 251, 3, 1.0); 
                background-color: rgba(40, 40, 40, 0.6);
            }
            100% {
                /* 다시 약해짐 */
                box-shadow: 0 0 4px rgba(255, 251, 3, 0.2), inset 0 0 2px rgba(255, 251, 3, 0.1);
                border-color: rgba(255, 251, 3, 0.3);
                background-color: rgba(40, 40, 40, 0.3);
            }
        }

    /* [핵심 1] 텍스트 크기 자동 조절 (clamp 함수 사용) */
    /* 설명: 최소 14px, 평소엔 화면 너비의 1.3%, 최대 24px(1.5rem) 사이에서 자동 조절 */
    font-size: clamp(0.9rem, 1.3vw, 1.5rem);

    text-overflow: ellipsis;  /* ... 으로 표시 */
    
    display: block;
    max-width: 100%;          /* 부모 박스 너비를 넘지 않음 */

}

 <script>
/* --- 데이터 및 전역 변수 설정 --- */
const backgroundImages = [
'welcome.png', 
'image/3.future_world.png',
'image/6.softwares.jpg', 
'image/4.h_parts.png', 
'image/1.horserace.jpg', 
'image/2.cute_robot.png', 
'image/5.robot_hand.png'];

const backgroundTexts = [
    `Curated 300+ leading global companies in robotics and its ecosystem`
];

let currentBgIndex = 0;
let isPaused = false;
let preventSearchFocus = false;

/* --- 배경 로테이션 로직 (수정됨) --- */
function rotateBackgroundImage() {
    if (isPaused) return;
    const mainContent = document.querySelector('main');
    const h1 = document.querySelector('.home-content h1'); 
    
    if (!mainContent) return;

    // 1. 이미지 변경 (이 부분은 유지)
    currentBgIndex = (currentBgIndex + 1) % backgroundImages.length;
    mainContent.style.backgroundImage = `url('${backgroundImages[currentBgIndex]}')`;
    
    // 2. 텍스트 삭제 로직 제거 (아래 내용을 삭제하세요)
    /* if (currentBgIndex > 4 && h1) { 
        h1.style.opacity = '0'; 
        ...
    }
    */
}

let rotationInterval = setInterval(rotateBackgroundImage, 20000);

function toggleBackgroundRotation() {
    const btn = document.getElementById('bg-toggle-btn');
    const icon = btn.querySelector('i');
    const textSpan = document.getElementById('bg-toggle-text');

    if (isPaused) {
        rotationInterval = setInterval(rotateBackgroundImage, 20000);
        icon.className = 'fas fa-pause';
        textSpan.innerText = "Auto Play";
        isPaused = false;
        btn.style.borderColor = "#FFFB03";
    } else {
        clearInterval(rotationInterval);
        icon.className = 'fas fa-play';
        textSpan.innerText = "Stopped";
        isPaused = true;
        btn.style.borderColor = "#ff4444";
    }
}

/* --- 화면 렌더링 기능 --- */
function renderHome() {
    const container = document.getElementById('link-container');
    if(!container) return;
    
    // 카테고리 통계창 제거
    removeCountryStats();
    
    // 홈 콘텐츠 구조 생성
  container.innerHTML = `
        <div class="home-content"> 
            <h1>
                ${backgroundTexts[0]}
                <button class="text-close-btn" onclick="closeHomeText()" title="Close text">
                    <i class="fas fa-times"></i>
                </button>
            </h1>
        </div>
    `;
    
    // 사이드바 버튼 활성화 해제
    document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
    
    // 국가별 통계 다시 그리기
    renderCountryStats();
}
function closeHomeText() {
    const h1 = document.querySelector('.home-content h1');
    if (h1) {
        h1.style.opacity = '0'; // 서서히 투명해짐
        setTimeout(() => {
            if(h1) h1.remove(); // 0.5초 뒤 완전히 삭제
        }, 500);
    }
}
// [수정 완료] 중복 그리드 생성 방지 버전
function renderSpecificLinksSortedCustom(dataList, container) {
    if (!container) return; 
    
    // 이미 밖에서(filterLinks 함수 등에서) 그리드 상자를 만들어 보냈으므로,
    // 여기서 또 <div class="link-grid">를 만들면 안 됩니다.
    
    container.innerHTML = ''; // 기존 내용 초기화

    dataList.forEach(link => {
        const card = document.createElement('a');
        card.className = 'link-card'; 
        card.href = link.url;
        card.target = "_blank"; 

        const displayUrl = link.url.replace(/^https?:\/\//, '').split('/')[0];
        const flagClass = link.country ? `fi fi-${link.country}` : 'fas fa-globe';
        const categoryDisplay = link.category ? link.category.toUpperCase() : 'ROBOT';

        card.innerHTML = `
            <div class="card-info" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%;">
                <div class="link-title" style="color: #fff !important; font-weight: 700; margin-bottom: 10px;">${link.title}</div>
                <div class="card-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: auto;">
                    <span class="link-url" style="font-size: 0.8rem; color: #ccc;">
                        <span class="${flagClass}" style="margin-right: 5px;"></span>
                        ${displayUrl}
                    </span>
                    <span class="category-tag" style="font-size: 0.7rem; color: #FFFB03; border: 1px solid #FFFB03; padding: 2px 8px; border-radius: 4px;">
                        ${categoryDisplay}
                    </span>
                </div>
            </div>
        `;
        
        // [핵심] 새로 만든 박스가 아니라, 받아온 container(그리드)에 직접 넣습니다.
        container.appendChild(card);
    });
}

function filterLinks(category) {
    removeCountryStats();
    const container = document.getElementById('link-container');
    
    // 이 부분에서 'link-grid' 클래스가 있어야 위 CSS가 작동합니다.
    container.innerHTML = '<div class="link-grid" id="category-grid"></div>'; 
    const targetGrid = document.getElementById('category-grid');

    let filteredLinks = links.filter(link => link.category.toLowerCase() === category.toLowerCase());
    filteredLinks.sort((a, b) => a.title.toUpperCase().localeCompare(b.title.toUpperCase()));

    renderSpecificLinksSortedCustom(filteredLinks, targetGrid);

    // 버튼 활성화 스타일 처리
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('onclick').toLowerCase().includes("'" + category.toLowerCase() + "'")) {
            btn.classList.add('active');
        }
    });
    if(window.innerWidth <= 768) closeSidebar();
}

    preventSearchFocus = true;
    document.getElementById('notice-modal').style.display = 'none';
    setTimeout(() => { preventSearchFocus = false; }, 300);
    
    updateCategoryCounts(); 
    renderHome();
}

function toggleSidebar() { 
    document.getElementById('sidebar').classList.toggle('active'); 
}
function closeSidebar() { 
    document.getElementById('sidebar').classList.remove('active'); 
}

/* --- 통계 및 카운트 --- */
function removeCountryStats() { 
    const existing = document.querySelector('.country-stats-overlay');
    if (existing) existing.remove();
}

function renderCountryStats() {
    const mainArea = document.querySelector('main');
    if (!mainArea) return;
    
    removeCountryStats(); // 기존 통계창 삭제

    const statsOverlay = document.createElement('div');
    statsOverlay.className = 'country-stats-overlay';

    // 국가별 카운트 계산
    const counts = {};
    links.forEach(l => { 
        if (l.country) counts[l.country] = (counts[l.country] || 0) + 1; 
    });

    // [정렬 로직] 내림차순 정렬 (이미 되어있던 부분)
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

    // 제목 생성 (Grid 속성 제거됨)
    let html = `<div class="stats-title">Robot Links <br> by nation</div>`;

    // 상위 12개 국가만 표시 (세로로 너무 길어지지 않게 조절)
    // map 함수 안에 인덱스(i)를 추가하여 순위(1, 2, 3...) 표시 가능
    html += sorted.slice(0, 12).map(([code, count], index) => `
        <div class="stat-item">
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="color:#888; font-size:0.8rem; width:15px;">${index + 1}</span> <span class="fi fi-${code}"></span>
            </div>
            <span class="stat-count">${count}</span>
        </div>
    `).join('');

    statsOverlay.innerHTML = html;
    mainArea.appendChild(statsOverlay);
}

function updateCategoryCounts() {
    let hw = 0, sw = 0;
    document.querySelectorAll('.category-btn').forEach(btn => {
        const clickAttr = btn.getAttribute('onclick');
        if (!clickAttr) return;
        const catMatch = clickAttr.match(/'([^']+)'/);
        if (catMatch) {
            const cat = catMatch[1];
            const count = links.filter(link => link.category.toLowerCase() === cat.toLowerCase()).length;
            const originalText = btn.innerText.split('(')[0].trim();
            btn.innerHTML = `${originalText} <span style="opacity:0.6; font-size:0.8em;">(${count})</span>`;
            if (btn.classList.contains('cat-hardware')) hw += count; else sw += count;
        }
    });
    const hwTotal = document.getElementById('count-hardware');
    const swTotal = document.getElementById('count-software');
    if (hwTotal) hwTotal.innerText = `(${hw})`;
    if (swTotal) swTotal.innerText = `(${sw})`;
}

function searchLinks() {
    const filter = document.getElementById('searchInput').value.toLowerCase();
    if (filter.trim() === "") { renderHome(); return; }
    removeCountryStats();
    
    const container = document.getElementById('link-container');
    // 검색 결과용 그리드 박스 생성
    container.innerHTML = '<div class="link-grid" id="search-grid"></div>';
    const targetGrid = document.getElementById('search-grid');

    const filtered = links.filter(l => (l.title + (l.category||'')).toLowerCase().includes(filter));
    filtered.sort((a, b) => a.title.localeCompare(b.title));

    renderSpecificLinksSortedCustom(filtered, targetGrid);
}

/* --- 초기 실행 및 공통 리스너 --- */
window.onload = () => {
    // 1. 초기 통계 및 카운트 업데이트
    updateCategoryCounts();
    
    // 2. 중요: 홈 화면을 먼저 그려서 텍스트가 뜨게 함
    renderHome(); 
    
    // 3. 공지 모달 열기
    //openNoticeModal();
    
    // 4. 광고 로테이션 시작
    startAdRotation(); 
};

/* --- 광고 로테이션 기능 수정 (즉시 실행 + 10초 반복) --- */
function startAdRotation() {
    // 1. 광고를 변경하는 내부 함수 정의
    const showNextAd = () => {
        if (!links || links.length === 0) return;
        
        // 내 사이트(Learn Robot)가 광고에 안 나오게 하려면 필터링 (선택사항)
        // const externalLinks = links.filter(l => !l.url.includes("learnrobot.com"));
        // const randomLink = externalLinks[Math.floor(Math.random() * externalLinks.length)];
        
        const randomLink = links[Math.floor(Math.random() * links.length)];
        
        const adText = document.querySelector('.ad-banner .ad-company-name');
        const adAnchor = document.querySelector('.ad-banner');
        
        if (adText && adAnchor) {
            adText.innerHTML = randomLink.title;
            adAnchor.href = randomLink.url;
            adAnchor.target = "_blank";
        }
    };

    // 2. 페이지 로드 직후 즉시 실행 (기본값 Learn Robot을 바로 덮어씌움)
    showNextAd();

    // 3. 이후 10초마다 반복
    setInterval(showNextAd, 10000);
}

// 키보드 이벤트 리스너 통합 (스페이스바)
document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.code === 'Space') {
        const modal = document.getElementById('notice-modal');
        if (window.getComputedStyle(modal).display === 'flex') {
            e.preventDefault();
            closeNoticeModal();
        } else if (!preventSearchFocus && document.activeElement.tagName !== 'INPUT') {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
    }
});
