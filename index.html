<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's LearnRobot.com</title>
    
    <link rel="icon" href="image/favicon.png?v=2" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* [핵심] 스크롤 완벽 차단 및 화면 꽉 채우기 */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden; 
            
            /* 🚨 수정: 원본 배경 대신 명판 이미지를 화면 전체에 꽉 채웁니다 */
            background-color: #0b0d10; 
            background-image: url('image/new metal plate.jpg');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
        }

        .gateway-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 5vh;
            padding: 20px;
        }

        /* 1. 심플한 타이틀 영역 */
        .title-area { 
            text-align: center; 
            transform: translateY(-1vh); /* 🚨 수정: 명판 배경과 겹치지 않게 타이틀만 위로 끌어올림 */
        }
        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.2rem, 5vw, 4rem); 
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 30px rgba(134, 209, 209, 0.4);
            white-space: nowrap; 
            text-transform: none; 
        }
        .sub-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: #aaa;
            margin: 0;
            letter-spacing: 1px;
        }

        /* 2. 중앙 네온 로봇 (블루프린트 스타일) */
        .neon-robot-wrapper {
            position: relative;
            height: 45vh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .neon-robot-svg {
            height: 100%;
            width: auto;
            max-width: 90vw; 
            filter: drop-shadow(0 0 15px rgba(134, 209, 209, 0.5));
            animation: float-and-pulse 4s ease-in-out infinite alternate;
        }

        @keyframes float-and-pulse {
            0% { 
                transform: translateY(10px); 
                filter: drop-shadow(0 0 10px rgba(134, 209, 209, 0.3));
            }
            100% { 
                transform: translateY(-10px); 
                filter: drop-shadow(0 0 40px rgba(134, 209, 209, 0.9));
            }
        }

     /* 3. 입장 버튼 그룹 */
        .button-group {
            display: flex;
            flex-direction: row; /* 세로(column)에서 가로(row)로 변경 */
            gap: 20px; 
            width: 100%;
            justify-content: center; /* 가운데 정렬 */
            flex-wrap: wrap; /* 모바일처럼 화면이 좁을 땐 자연스럽게 줄바꿈되도록 방어 */
        }

        /* 개별 버튼 디자인 */
        /* 1. 모든 버튼 공통 스타일: 가독성을 위해 어두운 반투명 배경 추가 */
/* 1. 모든 버튼 공통 스타일: 무거운 검은색 대신 '연한 청록색 + 강한 블러(유리 효과)' 적용 */
.door-handle-btn {
    display: flex;
    align-items: center;
    justify-content: center; 
    
    /* 🚨 수정됨: 검은색 배경 삭제, 테마 컬러(청록색)를 매우 연하게(15%) 적용 */
    background: rgba(134, 209, 209, 0.15); 
    
    /* 🚨 수정됨: 블러 강도를 3px에서 6px로 높여 뒷배경 빗살무늬를 부드럽게 뭉갬 */
    backdrop-filter: blur(6px); 
    
    color: #86D1D1; 
    border: 2px solid #86D1D1; 
    padding: 12px 30px;
    border-radius: 30px; 
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1rem, 1.5vw, 1.2rem); 
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.door-handle-btn:hover {
    background: #FFFB03; 
    color: #0b0d10; 
    border-color: #FFFB03; 
    box-shadow: 0 0 20px rgba(255, 251, 3, 0.6); 
    transform: scale(1.05); 
}

/* 2. Latest News 버튼 전용 강조 스타일 (테마 색상 활용) */
.door-handle-btn.news-btn {
    color: #FFFB03; /* 텍스트 노란색 */
    border-color: #FFFB03; /* 테두리 노란색 */
    background: rgba(255, 251, 3, 0.1); /* 배경에 은은한 노란빛 추가 */
    box-shadow: 0 0 10px rgba(255, 251, 3, 0.2); /* 기본 상태에서도 약한 글로우 효과 */
}

/* Latest News 버튼 마우스 호버 효과 */
.door-handle-btn.news-btn:hover {
    background: #FFFB03;
    color: #0b0d10;
    box-shadow: 0 0 25px rgba(255, 251, 3, 0.8);
}
        /* 핫스팟 클릭 및 텍스트 효과 */
        .intro-hotspot {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .intro-hotspot:hover, .intro-hotspot.active {
            filter: drop-shadow(0 0 20px #FFFB03);
            transform: scale(1.02);
            transform-origin: center;
        }
        .intro-hotspot:hover path, .intro-hotspot:hover rect, .intro-hotspot:hover circle, .intro-hotspot:hover line,
        .intro-hotspot.active path, .intro-hotspot.active rect, .intro-hotspot.active circle, .intro-hotspot.active line {
            stroke: #FFFB03;
        }
        
/* 양옆 공간에 나타나는 SVG 글자 폰트 강제 설정 */
.svg-tech-title { 
    fill: #FFFB03; 
    font-family: 'Orbitron', sans-serif; 
    font-size: 26px; 
    font-weight: 700; 
    letter-spacing: 2px;
    filter: drop-shadow(0px 0px 5px rgba(0,0,0,1)); /* 새로 추가 (검은색 테두리/그림자 효과) */
}
.svg-human-desc { 
    fill: #86D1D1; 
    font-family: 'Orbitron', sans-serif; 
    font-size: 26px; 
    font-weight: 900; /* 🚨 추가: 글씨 굵기를 최고(Black) 수준으로 두껍게 */
    letter-spacing: 1px;
    /* 🚨 수정: 검은색 그림자를 두 겹으로 겹치고 반경을 넓혀 배경과 완벽히 분리 */
    filter: drop-shadow(0px 0px 8px rgba(0,0,0,1)) drop-shadow(0px 2px 4px rgba(0,0,0,1)); 
}

        /* 투명한 클릭 보조 영역(hitbox)에는 네온 테두리가 생기지 않도록 방지 */
        .intro-hotspot:hover .hitbox, .intro-hotspot.active .hitbox {
            stroke: none !important;
        }

        /* 팔 안쪽 어두운 선은 클릭/호버 시에도 노란색으로 변하지 않도록 방지 */
        .intro-hotspot:hover .inner-arm, .intro-hotspot.active .inner-arm {
            stroke: #0b0d10 !important;
        }

        /* 📱 모바일 화면 전용 확대 */
        @media (max-width: 768px) {
            .neon-robot-svg {
                max-width: 105vw !important; 
                width: 105vw;
            }
            .svg-tech-title { font-size: 20px !important; }
            .svg-human-desc { font-size: 26px !important; }
            #info-head text, #info-arm text { transform: translateX(45px); }
            #info-body text, #info-leg text { transform: translateX(-45px); }
        }
    </style>
</head>
<body>

    <div class="gateway-container">
        
        <div class="title-area">
            <h1 class="main-title">Learn<span style="color: #FFFB03;">Robot</span>.com</h1>
        </div>

        <div class="neon-robot-wrapper" style="flex-direction: column;">
            <svg class="neon-robot-svg" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
                
                <!-- 🚨 수정: 이 안에는 로봇 뼈대만 들어가도록 원상복구 -->
                <g transform="translate(450, 0)">
                    
                    <g class="intro-hotspot" onclick="showIntroInfo('head', this)">
                        <rect x="100" y="50" width="100" height="90" rx="20" fill="transparent" stroke="#86D1D1" stroke-width="4"/>
                        <circle cx="130" cy="90" r="10" fill="#FFFB03" />
                        <circle cx="170" cy="90" r="10" fill="#FFFB03" />
                        <line x1="120" y1="120" x2="180" y2="120" stroke="#86D1D1" stroke-width="3" />
                        <line x1="150" y1="50" x2="150" y2="10" stroke="#86D1D1" stroke-width="4" />
                        <circle cx="150" cy="10" r="6" fill="#FFFB03">
                            <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
                        </circle>
                    </g>

                    <g class="intro-hotspot" onclick="showIntroInfo('arm', this)">
    <!-- 🚨 마스크 정의: 24px 두꺼운 선에서 안쪽 16px 두께만큼을 완전히 투명하게 파냅니다 -->
    <defs>
        <mask id="hollow-arms-mask">
            <!-- 전체를 보이게(하얀색) -->
            <rect x="0" y="0" width="100%" height="100%" fill="white" />
            <!-- 안쪽을 안 보이게(검은색) 처리. (마우스 호버 시 노란색으로 변하지 않도록 style 고정) -->
            <path d="M 65 180 L 35 250 L 45 320" fill="none" stroke="black" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" style="stroke: black !important;" />
            <path d="M 235 180 L 265 250 L 255 320" fill="none" stroke="black" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" style="stroke: black !important;" />
        </mask>
    </defs>

    <rect x="10" y="160" width="280" height="190" fill="transparent" class="hitbox" stroke="none" />
    
    <!-- 양쪽 팔 (위에서 만든 mask를 적용하여 가운데를 뚫음) -->
    <g mask="url(#hollow-arms-mask)">
        <path d="M 65 180 L 35 250 L 45 320" fill="none" stroke="#86D1D1" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" />
        <path d="M 235 180 L 265 250 L 255 320" fill="none" stroke="#86D1D1" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" />
    </g>
    
    <!-- 왼쪽 관절 및 손 -->
    <circle cx="35" cy="250" r="5" fill="#FFFB03" /> 
    <path d="M 33 345 L 33 330 L 45 320 L 57 330 L 57 345" fill="none" stroke="#86D1D1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- 오른쪽 관절 및 손 -->
    <circle cx="265" cy="250" r="5" fill="#FFFB03" /> 
    <path d="M 243 345 L 243 330 L 255 320 L 267 330 L 267 345" fill="none" stroke="#86D1D1" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
</g>

                    <g class="intro-hotspot" onclick="showIntroInfo('leg', this)">
                        <rect x="80" y="320" width="140" height="175" fill="transparent" class="hitbox" stroke="none" />
                        <rect x="115" y="330" width="24" height="140" rx="6" fill="transparent" stroke="#86D1D1" stroke-width="4" />
                        <rect x="161" y="330" width="24" height="140" rx="6" fill="transparent" stroke="#86D1D1" stroke-width="4" />
                        <rect x="102" y="470" width="50" height="15" rx="5" fill="transparent" stroke="#86D1D1" stroke-width="4" />
                        <rect x="148" y="470" width="50" height="15" rx="5" fill="transparent" stroke="#86D1D1" stroke-width="4" />
                    </g>

                    <g class="intro-hotspot" onclick="showIntroInfo('body', this)">
                        <rect x="75" y="160" width="150" height="170" rx="25" fill="transparent" class="hitbox" stroke="none" />
                        
                        <rect x="75" y="160" width="150" height="170" rx="25" fill="transparent" stroke="#86D1D1" stroke-width="4" />
                        
                        <line x1="95" y1="185" x2="205" y2="185" stroke="#2C9999" stroke-width="2" stroke-dasharray="5,5" />
                        
                        <rect x="140" y="205" width="20" height="8" rx="2" fill="#2C9999" />
                        <rect x="125" y="213" width="50" height="70" rx="6" fill="none" stroke="#2C9999" stroke-width="4" />
                        <rect x="133" y="221" width="34" height="54" rx="3" fill="#86D1D1">
                            <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
                        </rect>
                        <path d="M 153 228 L 141 248 L 151 248 L 146 266 L 159 244 L 149 244 Z" fill="transparent" />
                        
                        <line x1="95" y1="305" x2="205" y2="305" stroke="#2C9999" stroke-width="2" stroke-dasharray="5,5" />
                    </g>
                </g> 
                
                <!-- 🚨 수정: 텍스트 정보는 로봇 그룹 바깥쪽 제자리에 원상복구 (로봇과 안 겹침) -->
                <g id="info-head" class="info-group" style="opacity: 0; transition: opacity 0.3s ease;">
                    <line x1="550" y1="95" x2="420" y2="95" stroke="#FFFB03" stroke-width="2" stroke-dasharray="4,4"/>
                    <text x="400" y="90" class="svg-tech-title" text-anchor="end">AI & VISION</text>
                    <text x="400" y="125" class="svg-human-desc" text-anchor="end">Like human brain & eyes</text>
                </g>

                <g id="info-arm" class="info-group" style="opacity: 0; transition: opacity 0.3s ease;">
                    <line x1="485" y1="260" x2="420" y2="260" stroke="#FFFB03" stroke-width="2" stroke-dasharray="4,4"/>
                    <text x="400" y="255" class="svg-tech-title" text-anchor="end">ACTUATORS</text>
                    <text x="400" y="290" class="svg-human-desc" text-anchor="end">Like human muscles</text>
                </g>

                <g id="info-body" class="info-group" style="opacity: 0; transition: opacity 0.3s ease;">
                    <line x1="680" y1="230" x2="780" y2="230" stroke="#FFFB03" stroke-width="2" stroke-dasharray="4,4"/>
                    <text x="800" y="225" class="svg-tech-title" text-anchor="start">BATTERY & MCU</text>
                    <text x="800" y="260" class="svg-human-desc" text-anchor="start">Like human heart & nerves</text>
                </g>

                <g id="info-leg" class="info-group" style="opacity: 0; transition: opacity 0.3s ease;">
                    <line x1="635" y1="400" x2="780" y2="400" stroke="#FFFB03" stroke-width="2" stroke-dasharray="4,4"/>
                    <text x="800" y="395" class="svg-tech-title" text-anchor="start">SENSORS & BALANCE</text>
                    <text x="800" y="430" class="svg-human-desc" text-anchor="start">Like human inner ear</text>
                </g>

            </svg>
        </div>

        <script>
    function showIntroInfo(partId, element) {
        document.querySelectorAll('.intro-hotspot').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');
        
        document.querySelectorAll('.info-group').forEach(el => {
            el.style.opacity = '0';
        });
        
        const infoEl = document.getElementById('info-' + partId);
        if(infoEl) {
            infoEl.style.opacity = '1';
        }
    }

    // 🚨 바탕 클릭 시 리셋 기능 추가
    document.addEventListener('click', function(event) {
        // 클릭한 요소가 로봇 부위(.intro-hotspot) 내부가 아니라면 리셋 실행
        if (!event.target.closest('.intro-hotspot')) {
            // 모든 활성화 상태 제거
            document.querySelectorAll('.intro-hotspot').forEach(el => el.classList.remove('active'));
            // 모든 텍스트 패널 투명하게 숨김
            document.querySelectorAll('.info-group').forEach(el => el.style.opacity = '0');
        }
    });
</script>

<div class="button-group">
    <div onclick="window.location.href='news.html'" class="door-handle-btn news-btn" style="cursor: pointer;">
        Latest News
    </div>
    <div onclick="window.location.href='main.html'" class="door-handle-btn" style="cursor: pointer;">
        Robotics Tour
    </div>
    <div onclick="window.location.href='robotics_101.html'" class="door-handle-btn" style="cursor: pointer;">
        Robotics 101
    </div>
	<div onclick="window.location.href='industry_portal.html'" class="door-handle-btn" style="cursor: pointer;">
        Industry Portal
    </div>
	    

</div>
</body>
</html>
